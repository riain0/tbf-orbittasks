# Nightly coverage — W3 step 3.
#
# Coverage instrumentation costs ~30% of every test run. We don't need it
# on every PR; we need a trend over time. So it runs on a schedule (and
# on-demand) instead of blocking the PR path. The PR-path test stages run
# with coverage off (jest.config.js, vite.config.ts).
name: Coverage (nightly)

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch:

jobs:
  coverage:
    name: Collect coverage (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Test with coverage
        run: npm test --workspace=apps/${{ matrix.app }} -- --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.app }}-${{ github.run_id }}
          path: apps/${{ matrix.app }}/coverage
          retention-days: 14
